spring:
  application:
    name: chattr

logging:
  level:
    root: DEBUG
    com.acc.chattr: DEBUG

aws:
  region: ${AWS_REGION:ap-northeast-2}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:ap-northeast-2_test}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
  s3:
    bucket: ${S3_BUCKET:chattr-dev-files}
    presign-expiry-minutes: ${S3_PRESIGN_EXPIRY_MINUTES:10}
    endpoint: ${S3_ENDPOINT:}

chattr:
  dynamodb:
    table:
      user: ${TABLE_USER:chattr-dev-user}
      workspace: ${TABLE_WORKSPACE:chattr-dev-workspace}
      workspace-member: ${TABLE_WORKSPACE_MEMBER:chattr-dev-workspace-member}
      channel: ${TABLE_CHANNEL:chattr-dev-channel}
      channel-member: ${TABLE_CHANNEL_MEMBER:chattr-dev-channel-member}
      dm: ${TABLE_DM:chattr-dev-dm}
      message: ${TABLE_MESSAGE:chattr-dev-message}
      device: ${TABLE_DEVICE:chattr-dev-device}

---
spring:
  config:
    activate:
      on-profile: prod
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${aws.region}.amazonaws.com/${aws.cognito.user-pool-id}/.well-known/jwks.json
          issuer-uri: https://cognito-idp.${aws.region}.amazonaws.com/${aws.cognito.user-pool-id}

