spring:
  application:
    name: chattr
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

logging:
  level:
    root: WARN
    com.acc.chattr: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO

aws:
  region: ${AWS_REGION:ap-northeast-2}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:local-placeholder}
    client-id: ${COGNITO_CLIENT_ID:local-placeholder}
    client-secret: ${COGNITO_CLIENT_SECRET:local-placeholder}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
  s3:
    bucket: ${S3_BUCKET:chattr-dev-files}
    presign-expiry-minutes: ${S3_PRESIGN_EXPIRY_MINUTES:10}
    endpoint: ${S3_ENDPOINT:}

chattr:
  redis:
    topic: ${CHATTR_REDIS_TOPIC:chat}
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000}
  dynamodb:
    table:
      user: ${TABLE_USER:user}
      workspace: ${TABLE_WORKSPACE:workspace}
      workspace-member: ${TABLE_WORKSPACE_MEMBER:workspace-member}
      channel: ${TABLE_CHANNEL:channel}
      channel-member: ${TABLE_CHANNEL_MEMBER:channel-member}
      dm: ${TABLE_DM:dm}
      message: ${TABLE_MESSAGE:message}
      device: ${TABLE_DEVICE:device}

---
# prod 프로필: JwtDecoder는 SecurityConfig의 수동 빈으로 통일 관리 (issuer 검증 포함)
# spring.security.oauth2.resourceserver.jwt 자동 설정은 사용하지 않음
spring:
  config:
    activate:
      on-profile: prod

